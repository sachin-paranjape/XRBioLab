<!doctype html>
<html lang="en">
  <head>
    <title>XR Biology Lab | Educational Experience</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1a1a2e; /* Darker modern background */
        font-family: sans-serif;
        position: fixed; /* Prevents scroll bounce on mobile */
      }
      canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        touch-action: none; /* Disable default browser touch gestures on the canvas */
      }
      #info {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 600px;
        text-align: center;
        color: #f1f5f9;
        z-index: 100;
        pointer-events: none;
        background: rgba(15, 23, 42, 0.75);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 12px 20px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.4);
        font-size: 13px;
        line-height: 1.5;
        text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      }
      #xr-button {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 28px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: #ffffff;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        z-index: 1000;
        outline: none;
      }
      #xr-button:hover, #xr-button:active {
        background: rgba(78, 205, 196, 0.25);
        border-color: #4ecdc4;
        color: #4ecdc4;
        box-shadow: 0 0 20px rgba(78, 205, 196, 0.4), 0 8px 32px rgba(0, 0, 0, 0.3);
        transform: translateX(-50%) scale(1.05);
      }
      #xr-button.disabled {
        background: rgba(255, 255, 255, 0.03);
        border-color: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.3);
        cursor: not-allowed;
        box-shadow: none;
        transform: translateX(-50%);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
        }
      }
    </script>
    <script>
      // Fallback for Meta Immersive Web Emulator compatibility with newer Three.js versions.
      // By undefining XRWebGLBinding, we prevent Three.js from attempting to construct it with emulated
      // XRSessions, forcing it to fall back to the standard WebXR rendering path.
      if (typeof window !== 'undefined') {
        try {
          delete window.XRWebGLBinding;
        } catch (e) {
          window.XRWebGLBinding = undefined;
        }
      }
    </script>
  </head>
  <body>
    <div id="info">
        <strong>XR Biology Lab</strong><br/>
        <em>Desktop/Mobile:</em> Drag to rotate, Tap/Click models to learn.<br/>
        <em>VR:</em> Point at floor and click to Teleport. Click models to learn.
    </div>
    
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      // --- APPLICATION DATA ---
      const HOTSPOTS_DATA = [
        // Row 1: Genetics & Cell Core (z: -3.5)
        { id: 'nucleus', title: 'The Nucleus', desc: 'The command center of the cell. It acts like a vault, safely storing all of your DNA.', pos: [-2.8, 1.4, -3.5], color: 0x4ecdc4, type: 'nucleus' },
        { id: 'chromosome', title: 'Chromosome', desc: 'To fit inside the cell, DNA is tightly coiled and packed into X-shaped structures called chromosomes.', pos: [-1.2, 1.4, -3.5], color: 0xffe66d, type: 'chromosome' },
        { id: 'dna', title: 'Double Helix', desc: 'The famous double helix. It looks like a twisted ladder, made of two long strands winding around each other.', pos: [1.2, 1.4, -3.5], color: 0xff6b6b, type: 'dna' },
        { id: 'basepair', title: 'Base Pairs', desc: 'The rungs of the ladder. Adenine pairs with Thymine, and Cytosine pairs with Guanine. Your genetic code!', pos: [2.8, 1.4, -3.5], color: 0xc4b5fd, type: 'basepair' },
        
        // Row 2: Cellular Organelles (z: -7.5)
        { id: 'mitochondria', title: 'Mitochondria', desc: 'Known as the powerhouse of the cell. It takes in nutrients and creates energy-rich molecules.', pos: [-2.8, 1.4, -7.5], color: 0xf97316, type: 'mitochondria' },
        { id: 'ribosome', title: 'Ribosomes', desc: 'The protein builders of the cell. They connect amino acids together in specific chains to build proteins.', pos: [-1.2, 1.4, -7.5], color: 0x3b82f6, type: 'ribosome' },
        { id: 'er', title: 'Endoplasmic Reticulum', desc: 'A network of membranes functioning like a manufacturing and packaging system. It helps fold proteins.', pos: [1.2, 1.4, -7.5], color: 0x14b8a6, type: 'er' },
        { id: 'golgi', title: 'Golgi Apparatus', desc: 'The shipping center. It gathers simple molecules, combines them into complex ones, and packages them.', pos: [2.8, 1.4, -7.5], color: 0x84cc16, type: 'golgi' },

        // Row 3: Human Anatomy & Systems (z: -11.5)
        { id: 'heart', title: 'Human Heart', desc: 'A muscular organ that pumps blood through the circulatory system, delivering oxygen and nutrients to your body.', pos: [-2.8, 1.4, -11.5], color: 0xef4444, type: 'heart' },
        { id: 'brain', title: 'Human Brain', desc: 'The complex organ that controls thought, memory, emotion, touch, motor skills, and regulates our body.', pos: [-1.2, 1.4, -11.5], color: 0xf472b6, type: 'brain' },
        { id: 'lungs', title: 'The Lungs', desc: 'A pair of spongy, air-filled organs. They bring oxygen into the bloodstream and remove carbon dioxide.', pos: [1.2, 1.4, -11.5], color: 0xfca5a5, type: 'lungs' },
        { id: 'bone', title: 'Skeletal System', desc: 'Bones provide structure, protect organs, and anchor muscles. This represents a human femur bone.', pos: [2.8, 1.4, -11.5], color: 0xfef08a, type: 'bone' }
      ];

      // --- GLOBAL VARIABLES ---
      let camera, scene, renderer, controls;
      let userRig; 
      let infoPanelMesh, floorMesh, teleportMarker;
      let currentTextToRead = '';
      const hotspotMeshes = [];
      const controllers = [];
      
      const raycaster = new THREE.Raycaster();
      const tempMatrix = new THREE.Matrix4();
      
      const XRButton = {
        createButton(renderer, sessionInit = null) {
          if (sessionInit === null) {
            sessionInit = { optionalFeatures: [ 'local-floor', 'bounded-floor', 'hand-tracking', 'layers' ] };
          }
          const button = document.createElement('button');
          button.id = 'xr-button';
          button.style.display = 'none';

          let currentSession = null;

          function showButton(label, sessionType) {
            button.style.display = 'block';
            button.textContent = label;
            button.className = '';

            let isRequesting = false;

            button.onclick = async () => {
              if (isRequesting) return;

              if (currentSession === null) {
                isRequesting = true;
                button.textContent = 'STARTING...';
                button.style.pointerEvents = 'none';

                try {
                  const options = sessionType === 'immersive-vr' ? sessionInit : {};
                  const session = await navigator.xr.requestSession(sessionType, options);
                  
                  const onSessionEnded = () => {
                    currentSession.removeEventListener('end', onSessionEnded);
                    button.textContent = label;
                    currentSession = null;
                    button.style.pointerEvents = 'auto';
                  };
                  session.addEventListener('end', onSessionEnded);

                  await renderer.xr.setSession(session);
                  button.textContent = sessionType === 'immersive-vr' ? 'EXIT VR' : 'EXIT MAGIC WINDOW';
                  currentSession = session;
                  button.style.pointerEvents = 'auto';
                } catch (err) {
                  console.error('Failed to start WebXR session:', err);
                  button.textContent = 'ERROR STARTING';
                  setTimeout(() => {
                    button.textContent = label;
                    button.style.pointerEvents = 'auto';
                  }, 2000);
                } finally {
                  isRequesting = false;
                }
              } else {
                currentSession.end();
              }
            };
          }

          function showVRNotSupported() {
            button.style.display = 'block';
            button.textContent = 'VR NOT SUPPORTED';
            button.classList.add('disabled');
            button.onclick = null;
          }

          if ('xr' in navigator) {
            navigator.xr.isSessionSupported('immersive-vr')
              .then((supported) => {
                if (supported) {
                  showButton('ENTER VR', 'immersive-vr');
                } else {
                  navigator.xr.isSessionSupported('inline')
                    .then((inlineSupported) => {
                      if (inlineSupported) {
                        showButton('ENTER MAGIC WINDOW', 'inline');
                      } else {
                        showVRNotSupported();
                      }
                    })
                    .catch(() => showVRNotSupported());
                }
              })
              .catch(() => showVRNotSupported());
          } else {
            showVRNotSupported();
          }

          return button;
        }
      };

      init();

      function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

        userRig = new THREE.Group();
        userRig.position.set(0, 0, 2);
        scene.add(userRig);

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 0); 
        userRig.add(camera);

        renderer = new THREE.WebGLRenderer({ antialias: true, xrCompatible: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(XRButton.createButton(renderer));

        controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.4, -3.5); 
        controls.update();

        setupLighting();
        setupEnvironment();
        setupTeleportMarker();
        setupHotspots();
        setupInfoPanel();
        setupControllers();

        window.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointerup', onPointerUp);
        window.addEventListener('resize', onWindowResize);

        if ('speechSynthesis' in window) window.speechSynthesis.getVoices();

        renderer.setAnimationLoop(animate);
      }

      function setupLighting() {
        // Returned to the moodier, darker lab lighting
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444455, 1.0));
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(0, 10, 5);
        scene.add(dirLight);
        
        // Colored ambient lighting to make it beautiful
        const pointLight1 = new THREE.PointLight(0x4ecdc4, 0.5, 30);
        pointLight1.position.set(-6, 3, -6);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0xff6b6b, 0.5, 30);
        pointLight2.position.set(6, 3, -6);
        scene.add(pointLight2);
      }

      // --- PROCEDURAL TEXTURES ---
      
      function createTileTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#cbd5e1';
        ctx.fillRect(0, 0, 512, 512);
        
        ctx.fillStyle = '#94a3b8';
        ctx.fillRect(0, 0, 256, 256);
        ctx.fillRect(256, 256, 256, 256);
        
        ctx.strokeStyle = '#64748b';
        ctx.lineWidth = 4;
        ctx.strokeRect(0, 0, 512, 512);
        ctx.beginPath(); ctx.moveTo(256, 0); ctx.lineTo(256, 512); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 256); ctx.lineTo(512, 256); ctx.stroke();

        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(15, 15);
        tex.colorSpace = THREE.SRGBColorSpace;
        return tex;
      }

      function createWallTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        const grad = ctx.createLinearGradient(0, 0, 0, 512);
        grad.addColorStop(0, '#f1f5f9');
        grad.addColorStop(1, '#e2e8f0');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 512);
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        for(let i=0; i<512; i+=32) {
            ctx.fillRect(0, i, 512, 2);
        }

        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(6, 3);
        tex.colorSpace = THREE.SRGBColorSpace;
        return tex;
      }

      function createWoodTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#3e2723'; 
        ctx.fillRect(0, 0, 512, 512);
        
        ctx.fillStyle = '#4e342e';
        for(let i=0; i<300; i++) {
            ctx.globalAlpha = Math.random() * 0.4 + 0.1;
            const y = Math.random() * 512;
            const h = Math.random() * 20 + 5;
            ctx.fillRect(0, y, 512, h);
        }

        const tex = new THREE.CanvasTexture(canvas);
        tex.colorSpace = THREE.SRGBColorSpace;
        return tex;
      }

      // --- ENVIRONMENT CREATION ---

      function setupEnvironment() {
        // Room bounds (30x30 to fit 3 rows)
        const roomGeo = new THREE.BoxGeometry(30, 12, 30);
        const wallTex = createWallTexture();
        const roomMat = new THREE.MeshStandardMaterial({ map: wallTex, side: THREE.BackSide, roughness: 0.9 });
        const room = new THREE.Mesh(roomGeo, roomMat);
        room.position.y = 6; 
        scene.add(room);

        // Interactive Floor
        const floorGeo = new THREE.PlaneGeometry(30, 30);
        const tileTex = createTileTexture();
        const floorMat = new THREE.MeshStandardMaterial({ map: tileTex, roughness: 0.1, metalness: 0.2 });
        floorMesh = new THREE.Mesh(floorGeo, floorMat);
        floorMesh.rotation.x = -Math.PI / 2;
        scene.add(floorMesh);

        // Row 1 Benches
        createLabBench(-2.5, 0, -3.5);
        createLabBench(2.5, 0, -3.5);
        
        // Row 2 Benches
        createLabBench(-2.5, 0, -7.5);
        createLabBench(2.5, 0, -7.5);

        // Row 3 Benches (Anatomy)
        createLabBench(-2.5, 0, -11.5);
        createLabBench(2.5, 0, -11.5);
        
        // Smartboard
        const boardGeo = new THREE.BoxGeometry(10, 4.5, 0.1);
        const boardMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.2, metalness: 0.5 });
        const board = new THREE.Mesh(boardGeo, boardMat);
        board.position.set(0, 3.5, -14.9);
        scene.add(board);
        
        const frameGeo = new THREE.BoxGeometry(10.2, 4.7, 0.05);
        const frameMat = new THREE.MeshBasicMaterial({ color: 0x4ecdc4 });
        const frame = new THREE.Mesh(frameGeo, frameMat);
        frame.position.set(0, 3.5, -14.95);
        scene.add(frame);
      }

      function createLabBench(x, y, z) {
        const group = new THREE.Group();
        group.position.set(x, y, z);

        const topGeo = new THREE.BoxGeometry(3.5, 0.08, 1.8);
        const woodTex = createWoodTexture();
        const topMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.3 });
        const top = new THREE.Mesh(topGeo, topMat);
        top.position.y = 1.0;
        
        const baseGeo = new THREE.BoxGeometry(3.2, 0.96, 1.5);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.8 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = 0.48; 

        group.add(top, base);
        scene.add(group);
      }

      function setupTeleportMarker() {
        const markerGeo = new THREE.RingGeometry(0.3, 0.4, 32);
        markerGeo.rotateX(-Math.PI / 2);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0x4ecdc4, transparent: true, opacity: 0.7, depthTest: false });
        teleportMarker = new THREE.Mesh(markerGeo, markerMat);
        teleportMarker.position.y = 0.01; 
        teleportMarker.visible = false;
        scene.add(teleportMarker);
      }

      function setupHotspots() {
        HOTSPOTS_DATA.forEach(data => {
          const group = new THREE.Group();
          group.position.fromArray(data.pos);
          group.userData = { ...data, baseY: data.pos[1] }; 

          const model = createBiologicalModel(data.type, data.color);
          group.add(model);
          group.userData.model = model;

          const colorHex = '#' + data.color.toString(16).padStart(6, '0');
          const labelTex = createTooltipTexture(data.title, colorHex);
          const labelMat = new THREE.MeshBasicMaterial({ map: labelTex, transparent: true, side: THREE.DoubleSide, depthTest: false });
          const labelGeo = new THREE.PlaneGeometry(0.8, 0.2);
          const labelMesh = new THREE.Mesh(labelGeo, labelMat);
          labelMesh.position.set(0, 0.8, 0); 
          group.add(labelMesh);
          group.userData.label = labelMesh; 

          const hitGeo = new THREE.SphereGeometry(0.5, 16, 16);
          const hitMat = new THREE.MeshBasicMaterial({ visible: false });
          const hitSphere = new THREE.Mesh(hitGeo, hitMat);
          group.add(hitSphere);
          group.userData.hitSphere = hitSphere; 

          scene.add(group);
          hotspotMeshes.push(group);
        });
      }

      // --- PROCEDURAL BIOLOGY & ANATOMY MODELS ---
      function createBiologicalModel(type, color) {
        const group = new THREE.Group();
        
        if (type === 'dna') {
          const sphereGeo = new THREE.SphereGeometry(0.08, 16, 16);
          const linkGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.6);
          const mat1 = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.2 });
          const mat2 = new THREE.MeshPhongMaterial({ color: 0x4ecdc4, emissive: 0x4ecdc4, emissiveIntensity: 0.2 });
          const linkMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
          for(let i = 0; i < 12; i++) {
            const y = (i - 5.5) * 0.12; const angle = i * 0.6;
            const p1 = new THREE.Mesh(sphereGeo, mat1); p1.position.set(Math.cos(angle)*0.25, y, Math.sin(angle)*0.25);
            const p2 = new THREE.Mesh(sphereGeo, mat2); p2.position.set(Math.cos(angle+Math.PI)*0.25, y, Math.sin(angle+Math.PI)*0.25);
            const link = new THREE.Mesh(linkGeo, linkMat); link.position.set(0, y, 0); link.rotation.y = -angle; link.rotation.z = Math.PI / 2;
            group.add(p1, p2, link);
          }
        } else if (type === 'nucleus') {
          const membraneGeo = new THREE.SphereGeometry(0.3, 32, 32);
          const membraneMat = new THREE.MeshPhongMaterial({ color: 0x8b5cf6, transparent: true, opacity: 0.4, shininess: 100 });
          const membrane = new THREE.Mesh(membraneGeo, membraneMat);
          const coreGeo = new THREE.IcosahedronGeometry(0.15, 1);
          const coreMat = new THREE.MeshPhongMaterial({ color: color, wireframe: true });
          const core = new THREE.Mesh(coreGeo, coreMat);
          group.add(membrane, core);
        } else if (type === 'chromosome') {
          const capGeo = new THREE.CapsuleGeometry(0.06, 0.4, 16, 16);
          const capMat = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 });
          const arm1 = new THREE.Mesh(capGeo, capMat); arm1.rotation.z = Math.PI / 6;
          const arm2 = new THREE.Mesh(capGeo, capMat); arm2.rotation.z = -Math.PI / 6;
          const centerGeo = new THREE.SphereGeometry(0.08, 16, 16);
          const centerMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
          const centromere = new THREE.Mesh(centerGeo, centerMat);
          group.add(arm1, arm2, centromere);
        } else if (type === 'basepair') {
          const bbGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5);
          const bbMat = new THREE.MeshPhongMaterial({color: 0x4ecdc4});
          const bb1 = new THREE.Mesh(bbGeo, bbMat); bb1.position.x = -0.25;
          const bb2 = new THREE.Mesh(bbGeo, bbMat); bb2.position.x = 0.25;
          const pGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.25);
          const pairA = new THREE.Mesh(pGeo, new THREE.MeshPhongMaterial({color: 0xff6b6b})); pairA.rotation.z = Math.PI/2; pairA.position.x = -0.125;
          const pairT = new THREE.Mesh(pGeo, new THREE.MeshPhongMaterial({color: 0xffe66d})); pairT.rotation.z = Math.PI/2; pairT.position.x = 0.125;
          group.add(bb1, bb2, pairA, pairT);
        } else if (type === 'mitochondria') {
          const bodyGeo = new THREE.CapsuleGeometry(0.15, 0.2, 16, 32);
          const bodyMat = new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 0.7 });
          const body = new THREE.Mesh(bodyGeo, bodyMat); body.rotation.z = Math.PI / 2;
          const innerGeo = new THREE.CapsuleGeometry(0.12, 0.15, 8, 16);
          const innerMat = new THREE.MeshPhongMaterial({ color: 0xffe0b2, wireframe: true });
          const inner = new THREE.Mesh(innerGeo, innerMat); inner.rotation.z = Math.PI / 2;
          group.add(body, inner);
        } else if (type === 'ribosome') {
          const largeUnit = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), new THREE.MeshPhongMaterial({ color: color }));
          const smallUnit = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), new THREE.MeshPhongMaterial({ color: 0x93c5fd }));
          smallUnit.position.set(0.1, -0.05, 0);
          group.add(largeUnit, smallUnit);
        } else if (type === 'er') {
          const foldMat = new THREE.MeshPhongMaterial({ color: color });
          for(let i=0; i<3; i++) {
            const fold = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.4, 16), foldMat);
            fold.scale.set(1, 1, 0.2); fold.position.set((i - 1) * 0.12, 0, 0); fold.rotation.z = Math.sin(i) * 0.2;
            group.add(fold);
          }
        } else if (type === 'golgi') {
          const stackMat = new THREE.MeshPhongMaterial({ color: color });
          for(let i=0; i<4; i++) {
            const stack = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.05, 16, 32, Math.PI), stackMat);
            stack.scale.set(1 - (i*0.1), 1, 1); stack.position.set(0, (i*0.06) - 0.1, 0); stack.rotation.x = Math.PI / 2;
            group.add(stack);
          }
        } else if (type === 'heart') {
          const hMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.1 });
          const leftLobe = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), hMat); leftLobe.position.set(-0.06, 0.06, 0);
          const rightLobe = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), hMat); rightLobe.position.set(0.06, 0.06, 0);
          const bottom = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.25, 16), hMat); bottom.position.set(0, -0.06, 0); bottom.rotation.z = Math.PI;
          const arteryMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6 });
          const artery = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.1), arteryMat); artery.position.set(0, 0.15, 0);
          group.add(leftLobe, rightLobe, bottom, artery);
        } else if (type === 'brain') {
          const bMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.8 });
          const leftHem = new THREE.Mesh(new THREE.CapsuleGeometry(0.12, 0.15, 16, 16), bMat); leftHem.rotation.x = Math.PI/2; leftHem.position.set(-0.07, 0, 0);
          const rightHem = leftHem.clone(); rightHem.position.set(0.07, 0, 0);
          const cerebellum = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 16), bMat); cerebellum.position.set(0, -0.08, -0.08);
          group.add(leftHem, rightHem, cerebellum);
        } else if (type === 'lungs') {
          const lMat = new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.9, roughness: 0.5 });
          const leftLung = new THREE.Mesh(new THREE.CapsuleGeometry(0.09, 0.18, 16, 16), lMat); leftLung.position.set(-0.11, 0, 0); leftLung.rotation.z = -0.15;
          const rightLung = new THREE.Mesh(new THREE.CapsuleGeometry(0.09, 0.18, 16, 16), lMat); rightLung.position.set(0.11, 0, 0); rightLung.rotation.z = 0.15;
          const trachea = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.15), new THREE.MeshStandardMaterial({color: 0xffffff})); trachea.position.set(0, 0.18, 0);
          group.add(leftLung, rightLung, trachea);
        } else if (type === 'bone') {
          const boMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 });
          const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.35), boMat);
          const end1a = new THREE.Mesh(new THREE.SphereGeometry(0.05), boMat); end1a.position.set(0.03, 0.18, 0);
          const end1b = new THREE.Mesh(new THREE.SphereGeometry(0.05), boMat); end1b.position.set(-0.03, 0.18, 0);
          const end2a = new THREE.Mesh(new THREE.SphereGeometry(0.05), boMat); end2a.position.set(0.03, -0.18, 0);
          const end2b = new THREE.Mesh(new THREE.SphereGeometry(0.05), boMat); end2b.position.set(-0.03, -0.18, 0);
          group.add(shaft, end1a, end1b, end2a, end2b);
          group.rotation.z = Math.PI / 4; 
        }

        return group;
      }

      function createTooltipTexture(text, colorHex) {
          const canvas = document.createElement('canvas');
          canvas.width = 512; canvas.height = 128;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(0, 0, 512, 128, 24); else ctx.fillRect(0, 0, 512, 128);
          ctx.fill();
          
          ctx.fillStyle = colorHex;
          ctx.font = 'bold 50px sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(text, 256, 64);
          const tex = new THREE.CanvasTexture(canvas);
          tex.colorSpace = THREE.SRGBColorSpace;
          return tex;
      }

      function setupInfoPanel() {
        const geo = new THREE.PlaneGeometry(1.4, 0.7);
        const mat = new THREE.MeshBasicMaterial({ transparent: true, side: THREE.DoubleSide });
        infoPanelMesh = new THREE.Mesh(geo, mat);
        infoPanelMesh.visible = false;
        scene.add(infoPanelMesh);
      }

      // --- INTERACTION & LOCOMOTION LOGIC ---

      function setupControllers() {
        for (let i = 0; i < 2; i++) {
            const controller = renderer.xr.getController(i);
            controller.addEventListener('selectstart', onVRSelectStart);
            
            const geometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)]);
            const line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
            line.scale.z = 5;
            controller.add(line);
            
            userRig.add(controller); 
            controllers.push(controller);
        }
      }

      function onVRSelectStart(event) {
        const controller = event.target;
        tempMatrix.identity().extractRotation(controller.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
        
        if (infoPanelMesh.visible) {
            infoPanelMesh.visible = false;
            stopSpeaking();
            return;
        }

        const hitSpheres = hotspotMeshes.map(g => g.userData.hitSphere);
        const hotspotIntersects = raycaster.intersectObjects(hitSpheres, false);
        if (hotspotIntersects.length > 0) {
            openPanel(hotspotIntersects[0].object.parent.userData);
            return;
        }

        const floorIntersects = raycaster.intersectObject(floorMesh);
        if (floorIntersects.length > 0) {
            const target = floorIntersects[0].point;
            userRig.position.x = target.x;
            userRig.position.z = target.z;
        }
      }

      const pointerStart = { x: 0, y: 0 };
      let pointerStartTime = 0;

      function onPointerDown(event) {
        if (event.target.tagName !== 'CANVAS') return;
        pointerStart.x = event.clientX;
        pointerStart.y = event.clientY;
        pointerStartTime = performance.now();
      }

      function onPointerUp(event) {
        if (event.target.tagName !== 'CANVAS') return;

        const dist = Math.hypot(event.clientX - pointerStart.x, event.clientY - pointerStart.y);
        const duration = performance.now() - pointerStartTime;

        // Threshold to distinguish tap/click from drag:
        if (dist < 8 && duration < 300) {
          const pointer = new THREE.Vector2();
          pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
          pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
          raycaster.setFromCamera(pointer, camera);
          
          if (infoPanelMesh.visible) {
              infoPanelMesh.visible = false;
              stopSpeaking();
              return; 
          }

          const hitSpheres = hotspotMeshes.map(g => g.userData.hitSphere);
          const intersects = raycaster.intersectObjects(hitSpheres, false);
          if (intersects.length > 0) openPanel(intersects[0].object.parent.userData);
        }
      }

      function openPanel(data) {
        const canvas = document.createElement('canvas');
        canvas.width = 1024; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = 'rgba(15, 23, 42, 0.95)';
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(0, 0, 1024, 512, 32); else ctx.fillRect(0, 0, 1024, 512);
        ctx.fill();

        ctx.fillStyle = '#' + data.color.toString(16).padStart(6, '0');
        ctx.font = 'bold 64px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(data.title, 512, 100);
        
        ctx.fillStyle = '#e2e8f0'; ctx.font = '40px sans-serif';
        let line = ''; let y = 220;
        data.desc.split(' ').forEach(word => {
            if (ctx.measureText(line + word + ' ').width > 900 && line.length > 0) {
                ctx.fillText(line, 512, y); line = word + ' '; y += 60;
            } else line += word + ' ';
        });
        ctx.fillText(line, 512, y);
        
        ctx.fillStyle = '#ef4444'; ctx.font = 'bold 36px sans-serif';
        ctx.fillText('[ Click anywhere to close ]', 512, 460);

        if (infoPanelMesh.material.map) infoPanelMesh.material.map.dispose();
        infoPanelMesh.material.map = new THREE.CanvasTexture(canvas);
        infoPanelMesh.material.map.colorSpace = THREE.SRGBColorSpace;
        infoPanelMesh.material.needsUpdate = true;
        infoPanelMesh.visible = true;

        const viewDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        const camWorldPos = new THREE.Vector3();
        camera.getWorldPosition(camWorldPos);
        infoPanelMesh.position.copy(camWorldPos).add(viewDir.multiplyScalar(1.2));
        infoPanelMesh.position.y += 0.1; 
        infoPanelMesh.quaternion.copy(camera.getWorldQuaternion(new THREE.Quaternion()));

        currentTextToRead = `This is the ${data.title}. ${data.desc}`;
        speakText(currentTextToRead);
      }

      function speakText(text) {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.rate = 0.95; 
          const englishVoice = window.speechSynthesis.getVoices().find(v => v.lang.includes('en') && !v.localService);
          if (englishVoice) utterance.voice = englishVoice;
          window.speechSynthesis.speak(utterance);
        }
      }

      function stopSpeaking() {
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function animate() {
        const time = performance.now() * 0.002;

        if (renderer.xr.isPresenting) {
            controls.enabled = false;
        } else {
            controls.enabled = true;
        }

        hotspotMeshes.forEach((group, i) => {
          group.position.y = group.userData.baseY + Math.sin(time + i) * 0.05;
          if (group.userData.model) {
            if (['heart', 'brain', 'lungs', 'bone'].includes(group.userData.type)) {
               group.userData.model.rotation.y += 0.005; 
               if (group.userData.type === 'heart') {
                  const scale = 1 + Math.sin(time * 4) * 0.05; 
                  group.userData.model.scale.set(scale, scale, scale);
               }
               if (group.userData.type === 'lungs') {
                  const scale = 1 + Math.sin(time * 2) * 0.04; 
                  group.userData.model.scale.set(scale, scale, scale);
               }
            } else {
               group.userData.model.rotation.y += 0.01;
               if (group.userData.type === 'dna') group.userData.model.rotation.y += 0.02; 
            }
          }
          if (group.userData.label) {
            const camPos = new THREE.Vector3();
            camera.getWorldPosition(camPos);
            group.userData.label.lookAt(camPos);
          }
        });

        if (renderer.xr.isPresenting) {
            teleportMarker.visible = false;
            for (const controller of controllers) {
                if (controller.visible) {
                    tempMatrix.identity().extractRotation(controller.matrixWorld);
                    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
                    raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
                    
                    const intersects = raycaster.intersectObject(floorMesh);
                    if (intersects.length > 0) {
                        teleportMarker.position.copy(intersects[0].point);
                        teleportMarker.position.y += 0.01; 
                        teleportMarker.visible = true;
                        break; 
                    }
                }
            }
        }

        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
